version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: xforge
      POSTGRES_PASSWORD: xforge_password
      POSTGRES_DB: xforge_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: xforge
      RABBITMQ_DEFAULT_PASS: xforge_password
    ports:
      - "5672:5672"
      - "15672:15672"

  chromadb:
    image: chromadb/chroma:0.4.24
    ports:
      - "8000:8000"
    volumes:
      - chromadata:/chroma/chroma

  brain:
    build: 
      context: ./brain
    environment:
      - DATABASE_URL=postgresql://xforge:xforge_password@postgres:5432/xforge_db
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://xforge:xforge_password@rabbitmq:5672/
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8001:8000"
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - chromadb

  executor:
    build:
      context: ./executor
    environment:
      - RABBITMQ_URL=amqp://xforge:xforge_password@rabbitmq:5672/
    depends_on:
      - rabbitmq

volumes:
  pgdata:
  chromadata:
